<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>記帳本</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>💰 記帳本</h1>
    <nav class="tab-nav">
      <a class="tab active" href="#transactions" data-tab="transactions">記帳</a>
      <a class="tab" href="#accounts" data-tab="accounts">帳戶</a>
      <a class="tab" href="#recurring" data-tab="recurring">固定支出</a>
      <a class="tab" href="#budgets" data-tab="budgets">預算</a>
      <a class="tab" href="#reports" data-tab="reports">報表</a>
      <a class="tab" href="#trips" data-tab="trips">旅遊</a>
    </nav>
  </header>

  <main>
    <!-- ═══ Transactions Tab ═══ -->
    <section id="page-transactions" class="page active">
      <!-- Add / Edit Transaction Form -->
      <div class="form-card" id="form-section">
        <h2 id="form-title">新增交易</h2>
        <form id="tx-form">
          <input type="hidden" id="edit-id">
          <!-- Transaction type selector -->
          <div class="tx-type-bar">
            <button type="button" class="tx-type active" data-type="expense">支出</button>
            <button type="button" class="tx-type" data-type="income">收入</button>
            <button type="button" class="tx-type" data-type="transfer">轉帳</button>
          </div>
          <div class="row">
            <label>金額<input type="number" id="amount" step="0.01" min="0.01" required placeholder="0"></label>
            <label>日期<input type="date" id="date" required></label>
          </div>
          <div class="row">
            <label>來源帳戶
              <select id="source-account" required></select>
            </label>
            <label>目的帳戶
              <select id="dest-account" required></select>
            </label>
          </div>
          <div class="row" id="category-row">
            <label>大分類
              <select id="category"></select>
            </label>
            <label>小分類
              <select id="subcategory"><option value="">（無）</option></select>
            </label>
          </div>
          <label>說明<input type="text" id="description" placeholder="交易說明"></label>
          <div class="row">
            <label>標籤<input type="text" id="tags" placeholder="逗號分隔"></label>
          </div>
          <label>備註<input type="text" id="note" placeholder="選填"></label>
          <div class="form-actions">
            <button type="submit" id="submit-btn">新增</button>
            <button type="button" id="cancel-btn" class="secondary" style="display:none">取消</button>
          </div>
        </form>
      </div>

      <!-- Filter -->
      <div class="filter-bar">
        <label>搜尋 <input type="text" id="filter-q" placeholder="名稱/備註/標籤"></label>
        <label>從 <input type="date" id="filter-from"></label>
        <label>到 <input type="date" id="filter-to"></label>
        <label>類型
          <select id="filter-type">
            <option value="">全部</option>
            <option value="expense">支出</option>
            <option value="income">收入</option>
            <option value="transfer">轉帳</option>
          </select>
        </label>
        <label>分類
          <select id="filter-category">
            <option value="">全部</option>
          </select>
        </label>
        <button id="filter-btn">篩選</button>
        <button id="reset-btn" class="secondary">重置</button>
        <a class="export-link" href="/api/export?days=30" download>匯出 CSV</a>
      </div>

      <!-- Search Trend (hidden by default, shown when searching) -->
      <div id="search-trend" class="report-section" style="display:none">
        <h2>搜尋趨勢</h2>
        <div id="trend-chart" class="chart-container"></div>
      </div>

      <!-- Summary -->
      <div class="summary" id="summary"></div>

      <!-- Transaction List -->
      <div class="expense-list" id="tx-list">
        <p class="empty">載入中...</p>
      </div>
    </section>

    <!-- ═══ Accounts Tab ═══ -->
    <section id="page-accounts" class="page">
      <div class="form-card">
        <h2>新增帳戶</h2>
        <form id="account-form">
          <div class="row">
            <label>名稱<input type="text" id="acc-name" required placeholder="帳戶名稱"></label>
            <label>類型
              <select id="acc-type" required>
                <option value="asset">資產</option>
                <option value="liabilities">負債</option>
                <option value="revenue">收入</option>
                <option value="expense">支出</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>圖示<input type="text" id="acc-icon" placeholder="💰"></label>
            <label>初始餘額<input type="number" id="acc-balance" step="0.01" value="0"></label>
          </div>
          <div class="form-actions">
            <button type="submit">新增帳戶</button>
          </div>
        </form>
      </div>

      <!-- Account groups -->
      <div id="account-groups"></div>
    </section>

    <!-- ═══ Recurring Tab ═══ -->
    <section id="page-recurring" class="page">
      <div class="form-card">
        <h2>新增固定交易</h2>
        <form id="recurring-form">
          <div class="row">
            <label>名稱<input type="text" id="rec-title" required placeholder="例：房租"></label>
            <label>金額<input type="number" id="rec-amount" step="0.01" min="0.01" required></label>
          </div>
          <div class="row">
            <label>來源帳戶
              <select id="rec-source" required></select>
            </label>
            <label>目的帳戶
              <select id="rec-dest" required></select>
            </label>
          </div>
          <div class="row">
            <label>頻率
              <select id="rec-freq" required>
                <option value="monthly">每月</option>
                <option value="weekly">每週</option>
                <option value="daily">每日</option>
                <option value="yearly">每年</option>
              </select>
            </label>
            <label>下次日期<input type="date" id="rec-next" required></label>
          </div>
          <div class="row">
            <label>分類
              <select id="rec-category"><option value="">（無）</option></select>
            </label>
          </div>
          <div class="form-actions">
            <button type="submit">新增</button>
            <button type="button" id="process-recurring-btn" class="secondary">執行到期項目</button>
          </div>
        </form>
      </div>
      <div id="recurring-list"></div>
    </section>

    <!-- ═══ Budgets Tab ═══ -->
    <section id="page-budgets" class="page">
      <div class="form-card">
        <h2>設定月預算</h2>
        <form id="budget-form">
          <div class="row">
            <label>月份<input type="month" id="budget-month" required></label>
            <label>分類
              <select id="budget-category">
                <option value="">整體預算</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>預算金額<input type="number" id="budget-amount" step="1" min="1" required placeholder="0"></label>
          </div>
          <div class="form-actions">
            <button type="submit">設定預算</button>
          </div>
        </form>
      </div>

      <!-- Budget Status -->
      <div class="budget-month-nav">
        <button id="budget-prev" class="secondary">&lt;</button>
        <span id="budget-month-label"></span>
        <button id="budget-next" class="secondary">&gt;</button>
      </div>
      <div id="budget-status"></div>
    </section>

    <!-- ═══ Reports Tab ═══ -->
    <section id="page-reports" class="page">
      <div class="report-section">
        <h2>月收支對比</h2>
        <div id="monthly-chart" class="chart-container"></div>
      </div>
      <div class="report-section">
        <h2>支出分類佔比</h2>
        <div class="row">
          <label>從 <input type="date" id="report-from"></label>
          <label>到 <input type="date" id="report-to"></label>
          <button id="report-filter-btn">更新</button>
        </div>
        <div id="category-chart" class="chart-container"></div>
      </div>
      <div class="report-section">
        <h2>淨資產走勢</h2>
        <div id="networth-chart" class="chart-container"></div>
      </div>
    </section>
    <!-- ═══ Trips Tab ═══ -->
    <section id="page-trips" class="page">
      <!-- Trip list view -->
      <div id="trips-list-view">
        <div class="form-card">
          <h2>建立旅遊專案</h2>
          <form id="trip-form">
            <div class="row">
              <label>名稱<input type="text" id="trip-name" required placeholder="例：日本旅遊"></label>
              <label>目的地<input type="text" id="trip-dest" placeholder="例：東京"></label>
            </div>
            <div class="row">
              <label>開始日期<input type="date" id="trip-start"></label>
              <label>結束日期<input type="date" id="trip-end"></label>
            </div>
            <div class="row">
              <label>總預算<input type="number" id="trip-budget" step="1" min="0" value="0"></label>
              <label>幣別
                <select id="trip-currency">
                  <option value="TWD">TWD 新台幣</option>
                  <option value="JPY">JPY 日圓</option>
                  <option value="USD">USD 美元</option>
                  <option value="EUR">EUR 歐元</option>
                  <option value="KRW">KRW 韓圓</option>
                  <option value="HKD">HKD 港幣</option>
                </select>
              </label>
            </div>
            <label>建立者<input type="text" id="trip-creator" placeholder="你的名字"></label>
            <div class="form-actions">
              <button type="submit">建立旅遊專案</button>
            </div>
          </form>
        </div>
        <div id="trips-list"></div>
      </div>

      <!-- Trip detail view (shown when a trip is selected) -->
      <div id="trips-detail-view" style="display:none">
        <div class="trip-detail-header">
          <button class="secondary" id="trip-back-btn">← 返回</button>
          <h2 id="trip-detail-title"></h2>
          <p id="trip-detail-meta" class="trip-meta"></p>
        </div>

        <!-- Join by code -->
        <div class="form-card">
          <h3>加入成員</h3>
          <form id="trip-member-form">
            <div class="row">
              <label>成員名稱<input type="text" id="member-name" required placeholder="名稱"></label>
              <label>Email（選填）<input type="email" id="member-email" placeholder="email"></label>
            </div>
            <div class="form-actions">
              <button type="submit">加入</button>
            </div>
          </form>
          <div id="trip-members-list"></div>
        </div>

        <!-- Add expense -->
        <div class="form-card" id="trip-expense-form-card">
          <h3 id="trip-expense-form-title">新增費用</h3>
          <form id="trip-expense-form">
            <input type="hidden" id="trip-expense-edit-id">
            <div class="row">
              <label>說明<input type="text" id="texp-desc" placeholder="例：晚餐"></label>
              <label>金額<input type="number" id="texp-amount" step="0.01" min="0.01" required placeholder="0"></label>
            </div>
            <div class="row">
              <label>幣別
                <select id="texp-currency">
                  <option value="TWD">TWD</option>
                  <option value="JPY">JPY</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                  <option value="KRW">KRW</option>
                  <option value="HKD">HKD</option>
                </select>
              </label>
              <label>匯率（→TWD）<input type="number" id="texp-rate" step="0.0001" min="0.0001" value="1"></label>
            </div>
            <div class="row">
              <label>誰付的
                <select id="texp-paid-by" required></select>
              </label>
              <label>日期<input type="date" id="texp-date" required></label>
            </div>
            <div class="row">
              <label>分攤方式
                <select id="texp-split-type">
                  <option value="equal">平均分攤</option>
                  <option value="paid_by_one">付款者自付</option>
                  <option value="custom">自訂金額</option>
                </select>
              </label>
            </div>
            <div id="texp-custom-splits" style="display:none"></div>
            <div class="form-actions">
              <button type="submit" id="texp-submit-btn">新增費用</button>
              <button type="button" id="texp-cancel-btn" class="secondary" style="display:none">取消</button>
            </div>
          </form>
        </div>

        <!-- Expenses list -->
        <div class="report-section">
          <h3>費用清單</h3>
          <div id="trip-expenses-list"></div>
        </div>

        <!-- Settlement -->
        <div class="report-section">
          <h3>平攤計算</h3>
          <button id="calc-settlement-btn" class="secondary">重新計算</button>
          <div id="trip-settlement"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
